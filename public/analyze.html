<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Analyze — SEC Filing Analyzer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    .modes { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .mode {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 5px;
      color: rgba(255,255,255,0.55);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.05em;
      padding: 14px 8px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .mode:hover { border-color: rgba(255,255,255,0.3); color: var(--ink); }
    .mode.active { background: rgba(74,158,255,0.12); border-color: var(--accent); color: var(--accent); }
    .mode .ico { display: block; font-size: 18px; margin-bottom: 6px; }

    .scanbar {
      display: flex;
      align-items: center;
      background: var(--panel);
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      overflow: hidden;
      padding-left: 12px;
      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);
      transition: border-color 0.15s ease;
    }
    .scanbar:focus-within { border-color: var(--accent); }
    .scanbar .prompt { color: var(--accent); font-family: var(--mono); font-size: 13px; }
    .scanbar input {
      flex: 1; min-width: 0;
      background: transparent; border: none;
      color: var(--ink);
      font: 14px var(--mono);
      padding: 13px 12px;
    }
    .scanbar input::placeholder { color: var(--ink-45); }
    .scanbar input:focus { outline: none; }
    .scanbar button {
      background: var(--accent); color: var(--accent-dark);
      border: none; padding: 13px 20px;
      font: 600 13px var(--sans);
      cursor: pointer;
      transition: filter 0.15s ease;
    }
    .scanbar button:hover { filter: brightness(1.12); }

    #status {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--accent);
      min-height: 18px;
      margin: 12px 2px 0;
    }
    #status.error { color: #ff7a7a; }

    .dossier, .results { position: relative; overflow: hidden; margin-top: 16px; }
    .orbits {
      position: absolute; top: -20px; right: -60px;
      width: 320px; opacity: 0.45; pointer-events: none;
    }
    .orbits .spin { transform-origin: 170px 45px; animation: orbitspin 60s linear infinite; }
    @keyframes orbitspin { to { transform: rotate(360deg); } }

    .acquired {
      color: var(--ink-45);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      margin-bottom: 4px;
    }
    .tick-row { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
    h2.ticker {
      font-size: clamp(40px, 8vw, 64px);
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
      margin: 0;
    }
    .cname { color: var(--ink-60); font-size: 15px; }

    .statchips { display: flex; gap: 8px; flex-wrap: wrap; margin: 14px 0 16px; }
    .statchips .chip {
      background: rgba(74,158,255,0.15);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 3px;
    }
    details.othermatches { display: inline-block; position: relative; }
    details.othermatches summary {
      list-style: none;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--ink-60);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 3px;
    }
    details.othermatches summary::-webkit-details-marker { display: none; }
    details.othermatches summary:hover { border-color: var(--accent); color: var(--accent); }
    details.othermatches .dropdown {
      position: absolute; z-index: 20;
      top: calc(100% + 6px); left: 0;
      min-width: 260px; max-width: 80vw;
      background: rgba(5,8,13,0.97);
      border: 1px solid var(--line-strong);
      border-radius: 5px;
      padding: 6px;
    }
    details.othermatches .dropdown button {
      display: block; width: 100%;
      background: transparent; border: none;
      color: var(--ink);
      text-align: left;
      font: 13px var(--sans);
      padding: 8px 10px;
      border-radius: 4px;
      cursor: pointer;
    }
    details.othermatches .dropdown button:hover { background: rgba(74,158,255,0.12); }
    details.othermatches .dropdown .tk { color: var(--accent); font-family: var(--mono); font-size: 11px; }

    .launch {
      display: block; width: 100%;
      background: var(--accent); color: var(--accent-dark);
      border: none; border-radius: 5px;
      font: 600 14px var(--sans);
      letter-spacing: 0.02em;
      padding: 13px;
      cursor: pointer;
      transition: filter 0.15s ease;
    }
    .launch:hover { filter: brightness(1.12); }
    .launch .dm { font-size: 11px; vertical-align: 1px; }

    .filters { display: flex; gap: 6px; flex-wrap: wrap; margin: 18px 0 4px; }
    .filters button {
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--ink-60);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 3px;
      cursor: pointer;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .filters button:hover { border-color: var(--accent); color: var(--accent); }
    .filters button.active { background: rgba(74,158,255,0.18); border-color: transparent; color: var(--accent); }

    .rail { position: relative; padding-left: 22px; margin-top: 12px; }
    .rail::before {
      content: '';
      position: absolute; left: 5px; top: 8px; bottom: 8px;
      width: 1px;
      background: linear-gradient(180deg, var(--accent), rgba(74,158,255,0.08));
    }
    .frow { position: relative; padding: 9px 0; }
    .frow .node {
      position: absolute; left: -21px; top: 16px;
      width: 7px; height: 7px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      background: #000;
    }
    .frow.newest .node {
      width: 9px; height: 9px; left: -22px;
      background: var(--accent);
      border: none;
      box-shadow: 0 0 8px rgba(74,158,255,0.8);
      animation: nodepulse 2.4s ease-in-out infinite;
    }
    @keyframes nodepulse {
      0%, 100% { box-shadow: 0 0 6px rgba(74,158,255,0.6); }
      50% { box-shadow: 0 0 14px rgba(74,158,255,1); }
    }
    .frow .inner { display: flex; justify-content: space-between; align-items: center; gap: 10px; }
    .frow .formtag {
      font-family: var(--mono);
      font-size: 10px;
      padding: 2px 7px;
      border-radius: 3px;
      border: 1px solid rgba(255,255,255,0.2);
      color: rgba(255,255,255,0.75);
    }
    .frow.newest .formtag { background: var(--accent); border-color: var(--accent); color: var(--accent-dark); font-weight: 500; }
    .frow .ftitle { color: rgba(255,255,255,0.88); font-size: 13px; }
    .frow .fdate {
      color: var(--ink-45);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.04em;
      margin-top: 3px;
    }
    .frow .go {
      flex: none;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.75);
      font: 12px var(--sans);
      padding: 6px 12px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .frow .go:hover, .frow.newest .go { border-color: var(--accent); color: var(--accent); }
    .showmore {
      display: block;
      margin: 12px auto 0;
      background: transparent;
      border: 1px solid rgba(255,255,255,0.12);
      color: var(--ink-60);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 7px 16px;
      border-radius: 4px;
      cursor: pointer;
    }
    .showmore:hover { border-color: var(--accent); color: var(--accent); }

    .dropzone {
      display: block;
      width: 100%;
      background: transparent;
      border: 1px dashed rgba(255,255,255,0.25);
      border-radius: 6px;
      padding: 34px 16px;
      text-align: center;
      color: var(--ink-60);
      font: 14px var(--sans);
      cursor: pointer;
      transition: border-color 0.15s ease, background 0.15s ease;
    }
    .dropzone:hover, .dropzone.over { border-color: var(--accent); background: rgba(74,158,255,0.06); }
    .dropzone .mono-tag { display: block; margin-top: 8px; color: var(--ink-45); }
    .hidden { display: none !important; }

    /* ---------- Results ---------- */
    .togglerow { display: flex; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin: 14px 0 16px; }
    .seg {
      display: flex;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 4px;
      overflow: hidden;
    }
    .seg button {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.5);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.05em;
      padding: 7px 12px;
      cursor: pointer;
      transition: background 0.15s ease, color 0.15s ease;
    }
    .seg button:hover { color: var(--ink); }
    .seg button.on { background: rgba(74,158,255,0.18); color: var(--accent); }

    .briefing {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--line-strong);
      border-left: 2px solid var(--accent);
      border-radius: 0 6px 6px 0;
      padding: 14px 16px;
      margin-bottom: 12px;
    }
    .briefing .btag {
      color: var(--accent);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }
    .briefing p#r-briefing { color: rgba(255,255,255,0.9); font-size: 15px; line-height: 1.7; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 10px;
      margin-bottom: 12px;
    }
    .mcard {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 12px;
    }
    .mcard .mlabel {
      color: var(--ink-45);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
    }
    .mcard .mval {
      color: var(--ink);
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin: 4px 0 2px;
    }
    .mcard .mnote { font-family: var(--mono); font-size: 10px; letter-spacing: 0.04em; }
    .mcard .mnote.up { color: #7ddf9a; }
    .mcard .mnote.down { color: #ffb061; }
    .mcard .mnote.flat { color: rgba(255,255,255,0.5); }

    .scard {
      background: rgba(0,0,0,0.35);
      border: 1px solid var(--line-strong);
      border-radius: 6px;
      padding: 14px 16px;
      margin-bottom: 10px;
    }
    .scard .stagrow { margin-bottom: 7px; }
    .scard .stag {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 3px 9px;
      border-radius: 3px;
    }
    .scard .stag.positive { background: rgba(125,223,154,0.15); color: #7ddf9a; }
    .scard .stag.negative { background: rgba(255,176,97,0.15); color: #ffb061; }
    .scard .stag.neutral { background: rgba(74,158,255,0.15); color: var(--accent); }
    .scard .stitle { color: var(--ink); font-size: 15px; font-weight: 600; margin-bottom: 4px; }
    .scard .sbody { color: rgba(255,255,255,0.85); font-size: 14px; line-height: 1.65; }

    .rlist { list-style: none; padding: 0; }
    .rlist li {
      position: relative;
      padding: 8px 0 8px 22px;
      color: rgba(255,255,255,0.88);
      font-size: 14px;
      line-height: 1.6;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }
    .rlist li:last-child { border-bottom: none; }
    .rlist li::before {
      content: '◆';
      position: absolute; left: 2px; top: 9px;
      color: var(--accent);
      font-size: 9px;
    }

    /* ---------- Red flag radar ---------- */
    .flagstrip {
      background: rgba(255,122,122,0.06);
      border: 1px solid rgba(255,122,122,0.35);
      border-left: 2px solid #ff7a7a;
      border-radius: 0 6px 6px 0;
      padding: 13px 15px;
      margin-bottom: 12px;
    }
    .flagstrip .fhead {
      color: #ff7a7a;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.1em;
      margin-bottom: 10px;
    }
    .flagrow { display: flex; gap: 10px; margin-bottom: 10px; }
    .flagrow:last-child { margin-bottom: 0; }
    .flagrow .fsev {
      flex: none;
      align-self: flex-start;
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 0.06em;
      padding: 3px 8px;
      border-radius: 3px;
    }
    .flagrow .fsev.high { background: rgba(255,122,122,0.18); color: #ff7a7a; }
    .flagrow .fsev.medium { background: rgba(255,176,97,0.18); color: #ffb061; }
    .flagrow .fbody { color: rgba(255,255,255,0.88); font-size: 14px; line-height: 1.6; }
    .flagrow .fbody .ft { color: var(--ink); font-weight: 600; }
    .radar-clear {
      display: inline-block;
      background: rgba(125,223,154,0.12);
      color: #7ddf9a;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      padding: 5px 12px;
      border-radius: 3px;
      margin-bottom: 12px;
    }

    /* ---------- Compare ---------- */
    .rowbtns { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
    .frow .cmp {
      flex: none;
      background: transparent;
      border: 1px solid rgba(74,158,255,0.5);
      color: var(--accent);
      font-family: var(--mono);
      font-size: 11px;
      padding: 6px 10px;
      border-radius: 4px;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.15s ease, border-color 0.15s ease;
    }
    .frow .cmp:hover { background: rgba(74,158,255,0.12); border-color: var(--accent); }
    .mcard .cmpval { font-size: 16px; font-weight: 400; }
    .mcard .cmpval .mbefore { color: var(--ink-45); text-decoration: line-through; }
    .mcard .cmpval .marrow { color: var(--accent); }
    .mcard .cmpval .mafter { color: var(--ink); font-weight: 800; font-size: 19px; }

    /* ---------- Highlight to define ---------- */
    #def-hint { margin: -6px 0 14px; }
    .defbtn {
      position: fixed;
      z-index: 998;
      background: var(--accent);
      color: var(--accent-dark);
      border: none;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.06em;
      font-weight: 500;
      padding: 6px 11px;
      cursor: pointer;
      box-shadow: 0 0 14px rgba(74,158,255,0.45);
    }
    .defpop {
      position: fixed;
      z-index: 999;
      max-width: 300px;
      background: rgba(5,8,13,0.97);
      border: 1px solid var(--accent);
      border-radius: 6px;
      padding: 12px 14px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.6);
    }
    .defpop .dterm {
      color: var(--accent);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .defpop .dtext { color: rgba(255,255,255,0.92); font-size: 13px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="backdrop" aria-hidden="true"></div>
  <canvas id="stars" data-density="calm" aria-hidden="true"></canvas>

  <nav class="nav">
    <a class="brand" href="index.html"><span class="mark"></span>SEC ANALYZER</a>
    <div class="links">
      <a href="index.html">Home</a>
      <a href="analyze.html" class="active">Analyze</a>
      <a href="recent.html">Recent Filings</a>
    </div>
  </nav>

  <main class="page">
    <div class="modes" role="tablist" aria-label="Input mode">
      <button class="mode active" id="mode-search" type="button"><span class="ico">⌖</span>SEARCH</button>
      <button class="mode" id="mode-upload" type="button"><span class="ico">↥</span>UPLOAD</button>
      <button class="mode" id="mode-url" type="button"><span class="ico">⎘</span>URL</button>
    </div>

    <section id="panel-search">
      <form class="scanbar" id="search-form">
        <span class="prompt">▸</span>
        <input type="text" id="search-input" placeholder="company name or ticker" aria-label="Company name or ticker" autocomplete="off">
        <button type="submit">Scan</button>
      </form>
    </section>

    <section id="panel-upload" class="hidden">
      <button class="dropzone" id="dropzone" type="button">
        Drag a filing here, or tap to choose a PDF or image
        <span class="mono-tag">PDF · PNG · JPG — TEXT IS EXTRACTED RIGHT IN YOUR BROWSER, BIG FILES OK</span>
      </button>
      <input type="file" id="file-input" class="hidden" accept=".pdf,application/pdf,image/*">
    </section>

    <section id="panel-url" class="hidden">
      <form class="scanbar" id="url-form">
        <span class="prompt">▸</span>
        <input type="url" id="url-input" placeholder="https://www.sec.gov/… filing link" aria-label="Filing URL">
        <button type="submit">Fetch</button>
      </form>
    </section>

    <p id="status" aria-live="polite"></p>

    <div class="panel dossier hidden" id="dossier">
      <svg class="orbits" viewBox="0 0 340 90" aria-hidden="true">
        <g class="spin">
          <ellipse cx="170" cy="45" rx="150" ry="38" fill="none" stroke="#4A9EFF" stroke-width="0.6" opacity="0.5"/>
          <ellipse cx="170" cy="45" rx="110" ry="26" fill="none" stroke="#4A9EFF" stroke-width="0.5" opacity="0.3"/>
          <circle cx="62" cy="68" r="2.5" fill="#4A9EFF"/>
        </g>
      </svg>
      <p class="acquired" id="acquired"></p>
      <div class="tick-row">
        <h2 class="ticker" id="d-ticker">—</h2>
        <span class="cname" id="d-name"></span>
      </div>
      <div class="statchips" id="statchips"></div>
      <button class="launch" id="launch" type="button"><span class="dm">◆</span>&nbsp; Analyze latest filing</button>
      <div class="filters" id="filters"></div>
      <div class="rail" id="rail"></div>
      <button class="showmore hidden" id="showmore" type="button">SHOW MORE</button>
    </div>

    <div class="panel results hidden" id="results">
      <p class="acquired" id="r-meta"></p>
      <div class="tick-row">
        <h2 class="ticker" id="r-title">—</h2>
        <span class="cname" id="r-sub"></span>
      </div>
      <div class="togglerow">
        <div class="seg" id="display-toggle" role="group" aria-label="Display mode"></div>
        <div class="seg" id="level-toggle" role="group" aria-label="Reading level"></div>
      </div>
      <p class="mono-tag hidden" id="def-hint">TIP: HIGHLIGHT ANY CONFUSING WORD IN THE RESULTS FOR A PLAIN-ENGLISH DEFINITION</p>
      <div id="r-pres">
        <div class="briefing">
          <p class="btag">◆ BRIEFING</p>
          <p id="r-briefing"></p>
        </div>
        <div id="r-flags"></div>
        <div class="metrics" id="r-metrics"></div>
        <div id="r-sections"></div>
      </div>
      <div id="r-list-wrap" class="hidden">
        <ul class="rlist" id="r-list"></ul>
      </div>
    </div>
  </main>

  <script src="fx.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
